<section class="dashboard-shell" aria-labelledby="dashboard-title">
  <div class="dashboard-hero">
    <div class="hero-copy">
      <p class="hero-kicker">Operations overview</p>
      <h2 id="dashboard-title" class="hero-title">Live fleet coordination dashboard</h2>
    </div>

    <div class="hero-pill-group" aria-label="Simulation status">
      <div class="simulation-pill" [class.simulation-pill--active]="facade.running()">
        {{ facade.running() ? 'Simulation running' : 'Simulation paused' }}
      </div>
      <div class="simulation-pill">
        {{ facade.truckCount() }} visible / {{ facade.totalTruckCount() }} total trucks
      </div>
    </div>
  </div>

  <fleet-simulation-toolbar
    [running]="facade.running()"
    [truckCount]="facade.truckCount()"
    [totalTruckCount]="facade.totalTruckCount()"
    [searchTerm]="facade.searchTerm()"
    [hasActiveFilters]="facade.hasActiveFilters()"
    [settings]="facade.settings()"
    [filters]="facade.statusFilters()"
    [limits]="facade.simulationLimits"
    (toggleSimulation)="facade.toggleSimulation()"
    (searchTermChange)="facade.setSearchTerm($event)"
    (statusToggle)="facade.toggleStatusFilter($event)"
    (clearFilters)="facade.clearFilters()"
    (truckCountChange)="facade.updateTruckCount($event)"
    (tickMsChange)="facade.updateTickMs($event)"
    (dumpDwellTicksChange)="facade.updateDumpDwellTicks($event)"
    (resetScenario)="facade.resetScenario()"></fleet-simulation-toolbar>

  <fleet-summary-tiles
    [tiles]="facade.dashboardTiles()"
    [tileDragStartDelay]="tileDragStartDelay"
    (tileMoved)="facade.reorderDashboardTiles($event.previousIndex, $event.currentIndex, $event.title)"></fleet-summary-tiles>

  <fleet-status-legend [legendItems]="facade.legendItems"></fleet-status-legend>

  <p class="sr-only" aria-live="polite" aria-atomic="true">{{ facade.accessibilityAnnouncement() }}</p>
</section>

<section class="workspace-grid" aria-label="Fleet operations workspace">
  <fleet-telemetry-list
    [trucks]="facade.visibleTrucks()"
    [emptyStateMessage]="facade.emptyStateMessage()"
    [headline]="'Status is shown by both text and color. Showing ' + facade.truckCount() + ' trucks.'"></fleet-telemetry-list>

  <fleet-map-canvas
    [mapZones]="facade.mapZones"
    [trucks]="facade.mapTrucks()"
    [hoveredTruck]="facade.hoveredTruck()"
    [haulRoadPolylinePoints]="facade.haulRoadPolylinePoints"
    [emptyStateMessage]="facade.emptyStateMessage()"
    (truckHovered)="facade.showTruckHover($event)"
    (truckHoverEnded)="facade.hideTruckHover($event)"></fleet-map-canvas>

</section>
