<div class="app-container">
  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header class="app-header">
    <div class="header-content">
      <div class="header-title">
        <div class="header-toolbar">
          <span class="header-badge">Operations</span>
          <label class="theme-toggle" aria-label="Theme toggle">
            <span class="theme-toggle__label">{{ themeMode() === 'dark' ? 'Dark mode' : 'Light mode' }}</span>
            <input
              class="theme-toggle__switch"
              type="checkbox"
              role="switch"
              [checked]="themeMode() === 'dark'"
              [attr.aria-label]="themeMode() === 'dark' ? 'Switch to light theme' : 'Switch to dark theme'"
              (change)="toggleTheme($any($event.target).checked)"
            />
          </label>
        </div>

        <h1>Fleet Tracking Application</h1>
        <p class="subtitle">Site dispatch view for truck movement simulation and telemetry review.</p>
      </div>
    </div>
  </header>

  <main id="main-content" class="app-main" tabindex="-1">
    <fleet-map></fleet-map>
  </main>

  <footer class="app-footer" aria-label="Application footer">
    <p>FleetSim dashboard</p>
  </footer>
</div>
